<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Frann｜動画一覧</title>
  <style>
    :root {
      --player-width: 46%;
      --player-height: 68vh;
    }
    html, body {
      margin: 0; padding: 0; height: 100%; scroll-behavior: smooth;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      display: flex;
      padding: 15px;
      gap: 12px;
    }
    #sidebar {
      width: 0; overflow: hidden; background: white; border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: width 0.4s ease;
      height: fit-content; align-self: flex-start;
    }
    #sidebar.open { width: 340px; padding: 15px; }
    #toggleHistoryBtn {
      position: fixed; left: 15px; top: 25px;
      width: 32px; height: 32px;
      background: #333; color: white;
      border: none; border-radius: 50%; font-size: 18px;
      cursor: pointer; z-index: 300;
    }
    #main {
      flex: 1;
      display: flex;
      gap: 10px;
      width: 100%;
    }
    #player-area {
      width: var(--player-width);
      height: var(--player-height);
      flex-shrink: 0;
      position: relative;
      min-width: 340px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }
    #player-horizontal-handle {
      position: absolute; top: 0; right: -4px; width: 9px; height: 100%;
      cursor: col-resize; z-index: 220;
    }
    #vertical-resize-bar {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 8px;
      background: #ddd; cursor: row-resize; z-index: 230;
    }
    #resize-bar {
      width: 6px; background: #ddd; cursor: col-resize; z-index: 100;
    }
    #resize-bar:hover, #resize-bar.active,
    #vertical-resize-bar:hover, #vertical-resize-bar.active { background: #ff0000; }

    #thumbnail-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 100vh;
    }
    h2 { margin: 0 0 10px 0; text-align: center; font-size: 26px; color: #333; }
    #videos-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 0 6px 30px 4px;
    }
    #videos {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      width: 100%;
    }
    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .video-item:hover { transform: translateY(-4px); }
    .thumbnail { position: relative; cursor: pointer; }
    .thumbnail img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }
    .play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 54px; height: 54px;
      background: rgba(0,0,0,0.75);
      color: white;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 28px;
      pointer-events: none;
    }
    .active { outline: 4px solid #ff0000; outline-offset: -4px; }

    .fixed-buttons {
      position: fixed;
      right: 25px;
      bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }
    .fixed-btn {
      padding: 12px 22px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(0,0,0,0.35);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }
  </style>
</head>
<body>
  <button id="toggleHistoryBtn">›</button>
  <div id="sidebar">
    <h3>再生履歴</h3>
    <button id="clearHistoryBtn">全削除</button>
    <div id="history"></div>
  </div>

  <div id="main">
    <div id="player-area">
      <div id="player"></div>
      <div id="player-horizontal-handle"></div>
      <div id="vertical-resize-bar"></div>
    </div>
    <div id="resize-bar"></div>
    <div id="thumbnail-area">
      <h2>Frann｜動画一覧</h2>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading">動画を読み込み中...</div>
      </div>
    </div>
  </div>

  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ 一番上に戻る</button>
  </div>

<script>
  const API_KEY = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const CHANNEL_ID = "UCqRV_ZIQhVKfxG1_WkNiRbg";
  const CACHE_KEY = "frann_videos_cache";
  const CACHE_TIME = 1000 * 60 * 60 * 6; // 6時間

  let allVideos = [];
  let currentActive = null;
  let currentVideoEl = null;

  const els = {
    sidebar: document.getElementById("sidebar"),
    toggleBtn: document.getElementById("toggleHistoryBtn"),
    clearBtn: document.getElementById("clearHistoryBtn"),
    history: document.getElementById("history"),
    player: document.getElementById("player"),
    videos: document.getElementById("videos"),
    loading: document.getElementById("loading"),
    wrapper: document.getElementById("videos-wrapper"),
    jumpBtn: document.getElementById("jumpBtn"),
    topBtn: document.getElementById("topBtn")
  };

  // ==================== 履歴 ====================
  const loadHistory = () => JSON.parse(localStorage.getItem("frann_history") || "[]");
  const saveHistory = (video) => {
    let h = loadHistory().filter(v => v.id !== video.id);
    h.unshift(video);
    localStorage.setItem("frann_history", JSON.stringify(h.slice(0, 30)));
    renderHistory();
  };
  const renderHistory = () => {
    const history = loadHistory();
    els.history.innerHTML = history.length === 0 
      ? '<p style="color:#888;text-align:center;padding:30px 10px;">履歴はありません</p>'
      : history.map(item => 
          `<div class="history-item" data-id="${item.id}">${item.title}</div>`
        ).join('');
  };

  // ==================== 動画再生 ====================
  const playVideo = (videoId, title, el) => {
    els.player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    if (currentActive) currentActive.classList.remove("active");
    el.classList.add("active");
    currentActive = el;
    currentVideoEl = el;
    saveHistory({ id: videoId, title });
  };

  // ==================== データ取得（高速化） ====================
  async function getAllVideos() {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      const { data, timestamp } = JSON.parse(cached);
      if (Date.now() - timestamp < CACHE_TIME) {
        return data;
      }
    }

    els.loading.textContent = "チャンネル動画取得中... (初回は少し時間がかかります)";

    const getUploadsId = async () => {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`);
      const json = await res.json();
      return json.items[0].contentDetails.relatedPlaylists.uploads;
    };

    const playlistId = await getUploadsId();
    let videos = [], token = "";

    while (true) {
      const res = await fetch(
        `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}${token ? `&pageToken=${token}` : ""}`
      );
      const data = await res.json();
      if (data.items) videos.push(...data.items);
      if (!data.nextPageToken) break;
      token = data.nextPageToken;
    }

    const result = videos.sort((a, b) => new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt));

    localStorage.setItem(CACHE_KEY, JSON.stringify({ data: result, timestamp: Date.now() }));
    return result;
  }

  // ==================== レンダリング（インクリメンタル） ====================
  function renderVideoChunk(videos, start) {
    const fragment = document.createDocumentFragment();
    const end = Math.min(start + 50, videos.length);

    for (let i = start; i < end; i++) {
      const v = videos[i].snippet;
      const videoId = v.resourceId.videoId;
      if (!videoId) continue;

      const thumb = v.thumbnails?.medium?.url || v.thumbnails?.high?.url || "";
      const div = document.createElement("div");
      div.className = "video-item";
      div.dataset.id = videoId;
      div.innerHTML = `
        <div class="thumbnail">
          <img src="${thumb}" loading="lazy" decoding="async">
          <div class="play-btn">▶</div>
        </div>
        <p style="margin:10px; font-size:14px; line-height:1.4;">${v.title}</p>
      `;

      div.addEventListener("click", (e) => {
        if (e.target.closest('.play-btn')) {
          playVideo(videoId, v.title, div);
        }
      });

      fragment.appendChild(div);
    }
    els.videos.appendChild(fragment);
  }

  async function main() {
    try {
      allVideos = await getAllVideos();
      els.loading.style.display = "none";

      // 最初の50件だけ即時レンダリング
      renderVideoChunk(allVideos, 0);

      // スクロールで追加読み込み
      let loaded = 50;
      els.wrapper.addEventListener("scroll", () => {
        if (els.wrapper.scrollTop + els.wrapper.clientHeight > els.wrapper.scrollHeight - 300 && loaded < allVideos.length) {
          renderVideoChunk(allVideos, loaded);
          loaded += 50;
        }
      });

      renderHistory();
    } catch (e) {
      els.loading.innerHTML = `<span style="color:red;">取得エラー</span>`;
      console.error(e);
    }
  }

  // ==================== リサイズ ====================
  function initResize() {
    let isHorizontal = false, isVertical = false;

    const start = (e, vertical) => {
      if (vertical) isVertical = true;
      else isHorizontal = true;
      document.body.style.cursor = vertical ? "row-resize" : "col-resize";
    };

    document.getElementById("resize-bar").addEventListener("mousedown", start);
    document.getElementById("player-horizontal-handle").addEventListener("mousedown", start);
    document.getElementById("vertical-resize-bar").addEventListener("mousedown", () => start(null, true));

    document.addEventListener("mousemove", (e) => {
      if (isHorizontal) {
        const rect = document.getElementById("main").getBoundingClientRect();
        let w = ((e.clientX - rect.left) / rect.width) * 100;
        w = Math.max(28, Math.min(72, w));
        document.documentElement.style.setProperty("--player-width", w + "%");
      }
      if (isVertical) {
        const rect = document.getElementById("player-area").getBoundingClientRect();
        let h = Math.max(300, Math.min(window.innerHeight * 0.93, e.clientY - rect.top));
        document.documentElement.style.setProperty("--player-height", (h / window.innerHeight * 100) + "vh");
      }
    });

    document.addEventListener("mouseup", () => {
      isHorizontal = isVertical = false;
      document.body.style.cursor = "default";
    });
  }

  // ==================== イベント ====================
  els.toggleBtn.addEventListener("click", () => {
    els.sidebar.classList.toggle("open");
    els.toggleBtn.textContent = els.sidebar.classList.contains("open") ? "‹" : "›";
  });

  els.clearBtn.addEventListener("click", () => {
    if (confirm("再生履歴をすべて削除しますか？")) {
      localStorage.removeItem("frann_history");
      renderHistory();
    }
  });

  els.jumpBtn.onclick = () => currentVideoEl?.scrollIntoView({ behavior: "smooth", block: "center" });
  els.topBtn.onclick = () => els.wrapper.scrollTo({ top: 0, behavior: "smooth" });

  // 起動
  initResize();
  main();
</script>
</body>
</html>
