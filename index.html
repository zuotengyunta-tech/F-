<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>おすすめチャンネル集 - Playlist Viewer</title>
  <style>
    :root {
      --player-width: 45%;
      --player-height: 65vh;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      scroll-behavior: smooth;
      background: #f8f8f8;
      overflow: hidden;
    }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      padding: 15px 15px 15px 0;
      gap: 15px;
    }
    /* ==================== サイドバー ==================== */
    #sidebar {
      width: 0;
      overflow: hidden;
      background: white;
      border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      transition: width 0.4s ease;
      height: 100vh;
      align-self: stretch;
      padding: 15px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      contain: layout style paint;
    }
    #sidebar.open { width: 380px; }
    .sidebar-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #history, #later {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 8px;
      margin-top: 8px;
      scrollbar-width: thin;
      contain: strict;
    }
    #toggle-container {
      position: fixed;
      left: -2px;
      top: 20px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #toggleHistoryBtn, #toggleLaterBtn {
      width: 56px;
      height: 56px;
      background: #0f0f0f;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.55);
      transition: all 0.3s ease;
    }
    #toggleHistoryBtn:hover, #toggleLaterBtn:hover {
      background: #000000;
      transform: scale(1.18) translateX(2px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.7);
    }
    #main {
      flex: 1;
      display: flex;
      gap: 15px;
      max-width: 1400px;
      width: 100%;
    }
    #player-area {
      width: var(--player-width);
      height: var(--player-height);
      flex-shrink: 0;
      align-self: flex-start;
      position: relative;
      min-width: 320px;
      max-width: 70%;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    #player-horizontal-handle {
      position: absolute;
      top: 0;
      right: -4px;
      width: 9px;
      height: 100%;
      background: transparent;
      cursor: col-resize;
      z-index: 220;
    }
    #vertical-resize-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: #ddd;
      cursor: row-resize;
      z-index: 230;
      transition: background 0.2s;
    }
    #vertical-resize-bar:hover, #vertical-resize-bar.active { background: #ff0000; }
    #resize-bar {
      width: 6px;
      background: #ddd;
      cursor: col-resize;
      border-radius: 3px;
      margin: 0 -3px;
      z-index: 100;
      transition: background 0.2s;
    }
    #resize-bar:hover, #resize-bar.active { background: #ff0000; }
    #thumbnail-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 100vh;
      position: relative;
      contain: layout style paint;
    }
    h2 {
      margin: 0 0 8px 0;
      text-align: center;
      font-size: 25px;
    }
    #search-container {
      margin-bottom: 18px;
      position: relative;
    }
    #searchInput {
      width: 100%;
      padding: 12px 40px 12px 16px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
    }
    #searchInput:focus { border-color: #ff0000; outline: none; }
    #clearSearchBtn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 20px;
      color: #888;
      cursor: pointer;
      display: none;
    }
    #clearSearchBtn:hover { color: #ff0000; }
    #channel-filter {
      margin-bottom: 12px;
      padding: 10px 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      width: 100%;
      background: white;
    }
    #channel-filter:focus { border-color: #ff0000; outline: none; }
    #videos-wrapper {
      flex: 1;
      overflow-y: auto;
      padding-right: 80px;
      position: relative;
      scroll-behavior: smooth;
      contain: strict;
    }
    #videos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      position: relative;
      contain: layout style paint;
    }
    .video-item:hover { transform: translateY(-4px); }
    .thumbnail {
      position: relative;
      cursor: pointer;
    }
    .thumbnail img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: rgba(0,0,0,0.78);
      color: white;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 32px;
    }
    .play-btn:hover { background: #ff0000; }
    .video-title {
      padding: 12px;
      font-size: 14px;
      line-height: 1.38;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      position: relative;
      min-height: 78px;
    }
    .copy-btn, .later-btn {
      position: absolute;
      top: 10px;
      background: rgba(0,0,0,0.85);
      color: white;
      border: none;
      padding: 5px 10px;
      font-size: 11.5px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 30;
      opacity: 0;
      transition: all 0.25s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .later-btn { right: 12px; }
    .copy-btn { right: 72px; }
    .video-item:hover .copy-btn,
    .video-item:hover .later-btn {
      opacity: 1;
    }
    .copy-btn:hover { background: #4caf50; }
    .later-btn:hover { background: #ff9800; }
    .active {
      outline: 4px solid #ff0000;
      outline-offset: -4px;
    }
    /* 履歴・後で見る */
    .history-item, .later-item {
      padding: 11px 12px;
      margin-bottom: 8px;
      background: #f9f9f9;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      cursor: pointer;
      transition: all 0.2s ease;
      word-break: break-all;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-item:hover, .later-item:hover {
      background: #f0f0f0;
      transform: translateX(4px);
    }
    .later-item {
      background: #fff8e1;
    }
    .later-item-content {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .later-close-btn {
      color: #f44336;
      cursor: pointer;
      font-size: 16px;
      margin-left: 8px;
      flex-shrink: 0;
      padding: 0 4px;
      user-select: none;
    }
    .fixed-buttons {
      position: fixed;
      right: 75px;
      bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 500;
    }
    .fixed-btn {
      padding: 13px 26px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,0,0,0.55);
      transition: all 0.2s;
    }
    .fixed-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }
    #loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <!-- トグルボタン -->
  <div id="toggle-container">
    <button id="toggleHistoryBtn">›</button>
    <button id="toggleLaterBtn">›</button>
  </div>
  <!-- サイドバー -->
  <div id="sidebar">
    <div class="sidebar-section" id="historySection">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3>再生履歴</h3>
        <button id="clearHistoryBtn">全削除</button>
      </div>
      <div id="history"></div>
    </div>
    <hr style="border: none; border-top: 3px solid #eee; margin: 15px 0 25px 0;">
    <div class="sidebar-section" id="laterSection">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3>後で見る</h3>
        <button id="clearLaterBtn">全削除</button>
      </div>
      <div id="later"></div>
    </div>
  </div>
  <div id="main">
    <!-- プレイヤー -->
    <div id="player-area">
      <div id="player"></div>
      <div id="player-horizontal-handle"></div>
      <div id="vertical-resize-bar"></div>
    </div>
    <div id="resize-bar"></div>
    <!-- サムネイルエリア -->
    <div id="thumbnail-area">
      <h2>おすすめチャンネル集（5ch追加・2分以内＆ショート除外）</h2>
      <select id="channel-filter">
        <option value="">すべてのチャンネル</option>
      </select>
      <div id="search-container">
        <input type="text" id="searchInput" placeholder="動画タイトルで検索...">
        <button id="clearSearchBtn">×</button>
      </div>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading">全チャンネルを並列取得中...（高速モード）</div>
      </div>
    </div>
  </div>
  <!-- 固定ボタン -->
  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ サムネイル一番上に戻る</button>
  </div>

<script>
  // ==================== 設定 ====================
  const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const playlists = [
    { name: "Fラン大学就職チャンネル", id: "UUqRV_ZIQhVKfxG1_WkNiRbg" },
    { name: "トレトレチャンネル", id: "UUmD3ZX3hXhihuzVRVe5o27g" },
    { name: "rの住人ピエロ【哲学】", id: "UUY92Ma2-tzt8LLqodw9UF0g" },
    { name: "RECODE - 知性OSの再定義", id: "UUxeOH32jDFcRBV1D2lh7eFQ" },
    { name: "Paranoia_パラノイア（クリス・ヴォス）", id: "UU0PotgTwYxbOZuM9FbWKdcg" },
    { name: "かもなべ塾講師チャンネル", id: "UUT3s5ZjtUhg-TDI-hDYbTyA" }
  ];

  const historyKey = "multi_channel_history";
  const laterKey = "multi_channel_later";

  // ==================== DOM ====================
  const sidebar = document.getElementById("sidebar");
  const toggleHistoryBtn = document.getElementById("toggleHistoryBtn");
  const toggleLaterBtn = document.getElementById("toggleLaterBtn");
  const historyBox = document.getElementById("history");
  const laterBox = document.getElementById("later");
  const player = document.getElementById("player");
  const videosContainer = document.getElementById("videos");
  const loadingEl = document.getElementById("loading");
  const jumpBtn = document.getElementById("jumpBtn");
  const topBtn = document.getElementById("topBtn");
  const searchInput = document.getElementById("searchInput");
  const clearSearchBtn = document.getElementById("clearSearchBtn");
  const channelFilter = document.getElementById("channel-filter");

  let currentActive = null;
  let isHistoryVisible = false;
  let isLaterVisible = false;
  let allVideoElements = [];
  let videoMap = new Map(); // videoId → element

  let cachedHistory = [];
  let cachedLater = [];

  // ==================== ストレージ ====================
  function loadHistoryFromStorage() {
    try {
      cachedHistory = JSON.parse(localStorage.getItem(historyKey) || "[]");
    } catch { cachedHistory = []; }
  }
  function loadLaterFromStorage() {
    try {
      cachedLater = JSON.parse(localStorage.getItem(laterKey) || "[]");
    } catch { cachedLater = []; }
  }

  function updateSidebar() {
    const shouldOpen = isHistoryVisible || isLaterVisible;
    sidebar.classList.toggle("open", shouldOpen);
    toggleHistoryBtn.textContent = isHistoryVisible ? "‹" : "›";
    toggleLaterBtn.textContent = isLaterVisible ? "‹" : "›";
    document.getElementById("historySection").style.display = isHistoryVisible ? "flex" : "none";
    document.getElementById("laterSection").style.display = isLaterVisible ? "flex" : "none";
  }

  // ==================== 履歴・後で見る ====================
  function toggleHistory() {
    isHistoryVisible = !isHistoryVisible;
    updateSidebar();
    if (isHistoryVisible) renderHistory();
  }
  function toggleLater() {
    isLaterVisible = !isLaterVisible;
    updateSidebar();
    if (isLaterVisible) renderLater();
  }

  function saveHistory(video) {
    cachedHistory = cachedHistory.filter(item => item.id !== video.id);
    cachedHistory.unshift(video);
    cachedHistory = cachedHistory.slice(0, 30);
    localStorage.setItem(historyKey, JSON.stringify(cachedHistory));
    if (isHistoryVisible) renderHistory();
  }

  function saveLater(video) {
    if (cachedLater.some(item => item.id === video.id)) return;
    cachedLater.unshift(video);
    localStorage.setItem(laterKey, JSON.stringify(cachedLater));
    if (isLaterVisible) renderLater();
  }

  function removeLater(videoId) {
    cachedLater = cachedLater.filter(item => item.id !== videoId);
    localStorage.setItem(laterKey, JSON.stringify(cachedLater));
    renderLater();
  }

  function renderHistory() {
    historyBox.innerHTML = cachedHistory.length === 0
      ? '<p style="color:#888; text-align:center; padding:40px 10px;">履歴はありません</p>'
      : cachedHistory.map(item => `<div class="history-item" data-id="${item.id}">${item.title}</div>`).join('');
  }

  function renderLater() {
    laterBox.innerHTML = cachedLater.length === 0
      ? '<p style="color:#888; text-align:center; padding:40px 10px;">後で見るリストは空です</p>'
      : cachedLater.map(item => `
        <div class="later-item" data-id="${item.id}">
          <span class="later-item-content">${item.title}</span>
          <span class="later-close-btn">×</span>
        </div>
      `).join('');
  }

  // 動画を確実に探して再生する関数
  async function playVideoById(videoId) {
    let element = videoMap.get(videoId);
    
    // まだレンダリングされていない場合は少し待つ
    if (!element) {
      for (let i = 0; i < 30; i++) {
        await new Promise(r => setTimeout(r, 100));
        element = videoMap.get(videoId);
        if (element) break;
      }
    }

    if (element) {
      element.scrollIntoView({ behavior: "smooth", block: "center" });
      setTimeout(() => {
        const titleEl = element.querySelector('.video-title');
        const title = titleEl ? titleEl.textContent.trim() : '';
        playVideo(videoId, title, element);
      }, 300);
    } else {
      alert("動画が見つかりませんでした。ページを再読み込みしてください。");
    }
  }

  function handleHistoryClick(e) {
    const item = e.target.closest('.history-item');
    if (!item) return;
    playVideoById(item.dataset.id);
  }

  function handleLaterClick(e) {
    const closeBtn = e.target.closest('.later-close-btn');
    const itemEl = e.target.closest('.later-item');
    if (!itemEl) return;

    if (closeBtn) {
      e.stopImmediatePropagation();
      removeLater(itemEl.dataset.id);
    } else {
      playVideoById(itemEl.dataset.id);
    }
  }

  function clearHistory() {
    if (confirm("再生履歴をすべて削除しますか？")) {
      localStorage.removeItem(historyKey);
      cachedHistory = [];
      renderHistory();
    }
  }

  function clearLaterList() {
    if (confirm("後で見るリストをすべて削除しますか？")) {
      localStorage.removeItem(laterKey);
      cachedLater = [];
      renderLater();
    }
  }

  // ==================== プレイヤー ====================
  function playVideo(videoId, title, videoItemElement) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    
    if (currentActive) currentActive.classList.remove("active");
    videoItemElement.classList.add("active");
    currentActive = videoItemElement;
    saveHistory({ id: videoId, title });
  }

  function copyLink(videoId) {
    navigator.clipboard.writeText(`https://www.youtube.com/watch?v=${videoId}`).then(() => {
      const btn = event.currentTarget;
      const original = btn.textContent;
      btn.textContent = "✓ コピー";
      btn.style.background = "#4caf50";
      setTimeout(() => {
        btn.textContent = original;
        btn.style.background = "rgba(0,0,0,0.85)";
      }, 1600);
    });
  }

  function addToLater(videoId, title) {
    saveLater({ id: videoId, title });
    const btn = event.currentTarget;
    btn.style.background = "#4caf50";
    btn.textContent = "✓ 追加";
    setTimeout(() => {
      btn.style.background = "rgba(0,0,0,0.85)";
      btn.textContent = "後で見る";
    }, 1200);
  }

  // ==================== フィルター ====================
  function filterVideos() {
    const keyword = searchInput.value.toLowerCase().trim();
    const selectedChannel = channelFilter.value;
    let visibleCount = 0;

    allVideoElements.forEach(item => {
      const titleText = item.querySelector('.video-title').textContent.toLowerCase();
      const channelName = item.dataset.channel || "";
      const match = (!keyword || titleText.includes(keyword)) &&
                    (!selectedChannel || channelName === selectedChannel);
      item.style.display = match ? "" : "none";
      if (match) visibleCount++;
    });
  }

  // ==================== YouTube API（省略せず完全版） ====================
  async function getVideoDurations(videoIds) {
    if (!videoIds.length) return {};
    const durations = {};
    for (let i = 0; i < videoIds.length; i += 100) {
      const batch = videoIds.slice(i, i + 100);
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${batch.join(',')}&key=${apiKey}`);
        if (res.ok) {
          const data = await res.json();
          data.items?.forEach(item => {
            durations[item.id] = parseISO8601Duration(item.contentDetails.duration);
          });
        }
      } catch (e) { console.warn("Duration fetch error", e); }
    }
    return durations;
  }

  function parseISO8601Duration(duration) {
    const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
    let seconds = 0;
    if (match[1]) seconds += parseInt(match[1]) * 3600;
    if (match[2]) seconds += parseInt(match[2]) * 60;
    if (match[3]) seconds += parseInt(match[3]);
    return seconds;
  }

  async function fetchAllVideosFromPlaylist(playlistId) {
    let items = [], pageToken = "";
    do {
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`);
        if (!res.ok) break;
        const data = await res.json();
        items = items.concat(data.items || []);
        pageToken = data.nextPageToken;
      } catch (e) {
        console.error("Playlist取得エラー", e);
        break;
      }
    } while (pageToken);
    return items;
  }

  // ==================== 動画レンダリング ====================
  function renderVideosChunked(videos, startIdx = 0) {
    const BATCH = 120;
    const endIdx = Math.min(startIdx + BATCH, videos.length);
   
    let html = '';
    for (let i = startIdx; i < endIdx; i++) {
      const { videoId, title, thumbnail, pl } = videos[i];
      html += `
        <div class="video-item" data-id="${videoId}" data-channel="${pl.name}">
          <div class="thumbnail">
            <img src="${thumbnail}" loading="lazy" alt="${title}">
            <div class="play-btn">▶</div>
          </div>
          <div class="video-title">
            ${title}
            <button class="later-btn">後で見る</button>
            <button class="copy-btn">🔗</button>
          </div>
        </div>`;
    }

    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = html;
    const newElements = Array.from(tempDiv.children);

    newElements.forEach(el => {
      videosContainer.appendChild(el);
      allVideoElements.push(el);
      videoMap.set(el.dataset.id, el);
    });

    newElements.forEach(el => {
      const videoId = el.dataset.id;
      const titleText = el.querySelector('.video-title').textContent.trim();

      el.addEventListener('click', (e) => {
        if (!e.target.classList.contains('copy-btn') && !e.target.classList.contains('later-btn')) {
          playVideo(videoId, titleText, el);
        }
      });

      el.querySelector('.copy-btn').addEventListener('click', (e) => { 
        e.stopPropagation(); 
        copyLink(videoId); 
      });
      el.querySelector('.later-btn').addEventListener('click', (e) => { 
        e.stopPropagation(); 
        addToLater(videoId, titleText); 
      });
    });

    if (endIdx < videos.length) {
      requestAnimationFrame(() => renderVideosChunked(videos, endIdx));
    } else {
      loadingEl.style.display = "none";
    }
  }

  async function main() {
    loadingEl.textContent = "チャンネル取得中...（高速並列モード）";
    loadHistoryFromStorage();
    loadLaterFromStorage();

    playlists.forEach(pl => {
      const option = document.createElement("option");
      option.value = pl.name;
      option.textContent = pl.name;
      channelFilter.appendChild(option);
    });

    const playlistResults = await Promise.all(
      playlists.map(pl => fetchAllVideosFromPlaylist(pl.id).then(items => ({
        pl,
        items,
        videoIds: items.map(item => item.snippet.resourceId?.videoId).filter(Boolean)
      })))
    );

    const allVideoIds = playlistResults.flatMap(r => r.videoIds);
    const durations = await getVideoDurations(allVideoIds);

    const videosData = [];
    playlistResults.forEach(({ pl, items }) => {
      items.forEach(item => {
        const rawTitle = item.snippet.title;
        const videoId = item.snippet.resourceId?.videoId;
        if (!videoId) return;

        const durationSec = durations[videoId] || 0;
        if (durationSec > 0 && durationSec <= 120) return;

        const lower = rawTitle.toLowerCase();
        if (/(short|ショート|ショーツ|#short|1分|60秒|ティック|tiktok)/.test(lower)) return;

        videosData.push({
          videoId,
          title: `[${pl.name}] ${rawTitle}`,
          thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || "",
          pl
        });
      });
    });

    if (videosData.length) {
      renderVideosChunked(videosData);
    } else {
      loadingEl.textContent = "動画が見つかりません";
    }

    renderHistory();
    renderLater();
    updateSidebar();

    // イベント
    channelFilter.addEventListener("change", filterVideos);
    searchInput.addEventListener("input", () => {
      filterVideos();
      clearSearchBtn.style.display = searchInput.value ? "block" : "none";
    });
    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      filterVideos();
      clearSearchBtn.style.display = "none";
    });

    // サイドバークリック
    historyBox.addEventListener('click', handleHistoryClick);
    laterBox.addEventListener('click', handleLaterClick);
  }

  // 固定ボタン
  jumpBtn.addEventListener("click", () => currentActive && currentActive.scrollIntoView({ behavior: "smooth", block: "center" }));
  topBtn.addEventListener("click", () => document.getElementById("videos-wrapper").scrollTo({ top: 0, behavior: "smooth" }));
  toggleHistoryBtn.addEventListener("click", toggleHistory);
  toggleLaterBtn.addEventListener("click", toggleLater);
  document.getElementById("clearHistoryBtn").addEventListener("click", clearHistory);
  document.getElementById("clearLaterBtn").addEventListener("click", clearLaterList);

  // リサイズ機能（省略せず完全）
  function initResize() {
    const resizeBar = document.getElementById("resize-bar");
    const playerHorizontalHandle = document.getElementById("player-horizontal-handle");
    const verticalResizeBar = document.getElementById("vertical-resize-bar");
    const playerArea = document.getElementById("player-area");
    let isResizingHorizontal = false, isResizingVertical = false;

    const startHorizontal = (e) => {
      isResizingHorizontal = true;
      resizeBar.classList.add("active");
      playerHorizontalHandle.style.background = "rgba(255,0,0,0.3)";
      document.body.style.cursor = "col-resize";
      e.preventDefault();
    };

    resizeBar.addEventListener("mousedown", startHorizontal);
    playerHorizontalHandle.addEventListener("mousedown", startHorizontal);

    verticalResizeBar.addEventListener("mousedown", (e) => {
      isResizingVertical = true;
      verticalResizeBar.classList.add("active");
      document.body.style.cursor = "row-resize";
      e.preventDefault();
    });

    document.addEventListener("mousemove", (e) => {
      if (isResizingHorizontal) {
        const mainRect = document.getElementById("main").getBoundingClientRect();
        let newWidth = ((e.clientX - mainRect.left) / mainRect.width) * 100;
        newWidth = Math.max(25, Math.min(70, newWidth));
        document.documentElement.style.setProperty("--player-width", newWidth + "%");
      }
      if (isResizingVertical) {
        const playerRect = playerArea.getBoundingClientRect();
        let newHeightPx = e.clientY - playerRect.top;
        newHeightPx = Math.max(280, Math.min(window.innerHeight * 0.95, newHeightPx));
        document.documentElement.style.setProperty("--player-height", (newHeightPx / window.innerHeight * 100) + "vh");
      }
    });

    document.addEventListener("mouseup", () => {
      if (isResizingHorizontal) {
        isResizingHorizontal = false;
        resizeBar.classList.remove("active");
        playerHorizontalHandle.style.background = "transparent";
        document.body.style.cursor = "default";
      }
      if (isResizingVertical) {
        isResizingVertical = false;
        verticalResizeBar.classList.remove("active");
        document.body.style.cursor = "default";
      }
    });
  }

  initResize();
  main();
</script>
</body>
</html>
