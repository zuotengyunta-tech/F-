<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Fラン大学就職チャンネル - Playlist Viewer</title>
  <style>
    :root {
      --player-width: 45%;
      --player-height: 65vh;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; scroll-behavior: smooth;
      background: #f8f8f8; font-family: system-ui, -apple-system, Arial, sans-serif;
      overflow: hidden;
    }
    body { display: flex; padding: 15px 15px 15px 0; gap: 15px; }

    /* サイドバーなど（変更なし） */
    #sidebar { width: 0; overflow: hidden; background: rgba(255,255,255,0.98); border-radius: 12px;
      box-shadow: 2px 0 12px rgba(0,0,0,0.08); transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
      height: fit-content; align-self: flex-start; padding: 16px; backdrop-filter: blur(8px); }
    #sidebar.open { width: 340px; }
    .sidebar-section { margin-bottom: 24px; }
    #sidebar h3 { margin: 0 0 10px 0; font-size: 15px; font-weight: 700; color: #333; }
    #clearHistoryBtn, #clearLaterBtn { font-size: 12px; padding: 5px 10px; background: #ff4d4d; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .history-item, .later-item {
      padding: 10px 12px; margin-bottom: 6px; border-radius: 8px; font-size: 13.5px;
      cursor: pointer; transition: background 0.2s; line-height: 1.4;
    }
    .history-item:hover, .later-item:hover { background: #f0f0f0; }

    #toggle-container { position: fixed; left: 6px; top: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 9px; }
    #toggleHistoryBtn, #toggleLaterBtn {
      width: 40px; height: 40px; background: #111; color: white; border: none;
      border-radius: 50%; font-size: 21px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.45);
      transition: all 0.25s ease;
    }
    #toggleHistoryBtn:hover, #toggleLaterBtn:hover { transform: scale(1.12); box-shadow: 0 6px 16px rgba(0,0,0,0.6); }

    #search-container { position: fixed; top: 18px; right: 70px; z-index: 9999; width: 300px; }
    #searchInput {
      width: 100%; padding: 11px 18px; border: 1px solid #ddd; border-radius: 999px;
      font-size: 14.5px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      outline: none;
    }
    #searchInput:focus { border-color: #ff3333; }

    #main { flex: 1; display: flex; gap: 15px; max-width: 1400px; width: 100%; margin-top: 68px; }
    #player-area {
      width: var(--player-width); height: var(--player-height); flex-shrink: 0;
      position: relative; background: white; border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15); overflow: hidden;
    }
    #thumbnail-area { flex: 1; display: flex; flex-direction: column; }
    h2 { margin: 0 0 12px 0; text-align: center; font-size: 24px; color: #222; }

    #videos-wrapper { flex: 1; overflow-y: auto; padding-right: 10px; }
    #videos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    /* === 動画カード（ここを大幅修正） === */
    .video-item {
      background: white; border-radius: 12px; overflow: hidden;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1); transition: all 0.25s ease; position: relative;
    }
    .video-item:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

    .thumbnail {
      position: relative; cursor: pointer;
    }
    .thumbnail img {
      width: 100%; aspect-ratio: 16/9; object-fit: cover;
    }

    /* サムネイル上にボタンを移動 */
    .thumbnail-buttons {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .video-item:hover .thumbnail-buttons {
      opacity: 1;
    }

    .action-btn {
      background: rgba(0,0,0,0.85);
      color: white;
      border: none;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .action-btn:hover {
      background: #ff9800;
      transform: scale(1.05);
    }
    .later-btn { background: rgba(255, 152, 0, 0.95); }
    .later-btn:hover { background: #ff9800; }

    .play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 52px; height: 52px;
      background: rgba(0,0,0,0.75);
      color: white;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 28px;
      z-index: 10;
    }
    .play-btn:hover { background: #ff0000; }

    .video-title {
      padding: 12px 12px 14px 12px;
      font-size: 14px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .fixed-buttons {
      position: fixed; right: 30px; bottom: 30px; display: flex; flex-direction: column;
      gap: 10px; z-index: 100;
    }
    .fixed-btn {
      padding: 12px 22px; border: none; border-radius: 999px; color: white;
      font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }
  </style>
</head>
<body>
  <!-- 既存のHTML構造は変更なし -->
  <div id="toggle-container">
    <button id="toggleHistoryBtn">›</button>
    <button id="toggleLaterBtn">›</button>
  </div>
  <div id="search-container">
    <input type="text" id="searchInput" placeholder="動画タイトルで検索..." autocomplete="off">
  </div>
  <div id="sidebar">
    <div class="sidebar-section" id="historySection">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3>再生履歴</h3>
        <button id="clearHistoryBtn">全削除</button>
      </div>
      <div id="history"></div>
    </div>
    <hr style="border:none; border-top:1px solid #eee; margin:16px 0;">
    <div class="sidebar-section" id="laterSection">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3>後で見る</h3>
        <button id="clearLaterBtn">全削除</button>
      </div>
      <div id="later"></div>
    </div>
  </div>
  <div id="main">
    <div id="player-area">
      <div id="player"></div>
    </div>
    <div id="thumbnail-area">
      <h2>Fラン大学就職チャンネル</h2>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading">動画を読み込み中...</div>
      </div>
    </div>
  </div>
  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ 一番上に戻る</button>
  </div>

<script>
  // JavaScript部分はほぼそのまま（ボタン配置変更に合わせて少し調整）
  const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const playlistId = "UUqRV_ZIQhVKfxG1_WkNiRbg";
  const historyKey = "frann_history";
  const laterKey = "frann_later";

  const sidebar = document.getElementById("sidebar");
  const toggleHistoryBtn = document.getElementById("toggleHistoryBtn");
  const toggleLaterBtn = document.getElementById("toggleLaterBtn");
  const historyBox = document.getElementById("history");
  const laterBox = document.getElementById("later");
  const player = document.getElementById("player");
  const videosContainer = document.getElementById("videos");
  const loadingEl = document.getElementById("loading");
  const searchInput = document.getElementById("searchInput");

  let currentActive = null;
  let allVideoItems = [];

  function updateSidebar() {
    const open = isHistoryVisible || isLaterVisible;
    sidebar.classList.toggle("open", open);
    toggleHistoryBtn.textContent = isHistoryVisible ? "‹" : "›";
    toggleLaterBtn.textContent = isLaterVisible ? "‹" : "›";
  }

  let isHistoryVisible = false;
  let isLaterVisible = false;
  function toggleHistory() { isHistoryVisible = !isHistoryVisible; updateSidebar(); }
  function toggleLater() { isLaterVisible = !isLaterVisible; updateSidebar(); }

  function filterVideos() {
    const term = searchInput.value.toLowerCase().trim();
    allVideoItems.forEach(item => {
      item.style.display = item.dataset.title.toLowerCase().includes(term) ? "" : "none";
    });
  }
  searchInput.addEventListener("input", filterVideos);

  function renderSimpleList(container, items, isLater = false) {
    container.innerHTML = items.length === 0
      ? `<p style="color:#888; text-align:center; padding:20px 0; font-size:13px;">${isLater ? '後で見るリストは空です' : '履歴はありません'}</p>`
      : "";
    items.forEach(item => {
      const div = document.createElement("div");
      div.className = isLater ? "later-item" : "history-item";
      div.textContent = item.title;
      div.onclick = () => document.querySelector(`[data-id="${item.id}"]`)?.scrollIntoView({behavior: "smooth", block: "center"});
     
      if (isLater) {
        const remove = document.createElement("span");
        remove.textContent = "×";
        remove.style.float = "right";
        remove.style.color = "#f44";
        remove.style.cursor = "pointer";
        remove.onclick = (e) => { e.stopImmediatePropagation(); removeLater(item.id); };
        div.appendChild(remove);
      }
      container.appendChild(div);
    });
  }

  function loadHistory() { return JSON.parse(localStorage.getItem(historyKey) || "[]"); }
  function saveHistory(video) {
    let history = loadHistory();
    history = history.filter(h => h.id !== video.id);
    history.unshift(video);
    localStorage.setItem(historyKey, JSON.stringify(history.slice(0, 25)));
    renderSimpleList(historyBox, history);
  }

  function loadLater() { return JSON.parse(localStorage.getItem(laterKey) || "[]"); }
  function saveLater(video) {
    let later = loadLater();
    if (later.some(l => l.id === video.id)) return;
    later.unshift(video);
    localStorage.setItem(laterKey, JSON.stringify(later));
    renderSimpleList(laterBox, later, true);
  }
  function removeLater(id) {
    let later = loadLater().filter(l => l.id !== id);
    localStorage.setItem(laterKey, JSON.stringify(later));
    renderSimpleList(laterBox, later, true);
  }

  function playVideo(videoId, title, el) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1" allow="autoplay" allowfullscreen></iframe>`;
    if (currentActive) currentActive.classList.remove("active");
    el.classList.add("active");
    currentActive = el;
    saveHistory({id: videoId, title});
  }

  function copyLink(videoId) {
    navigator.clipboard.writeText(`https://www.youtube.com/watch?v=${videoId}`);
  }

  async function fetchAllVideos() {
    let items = [], token = "", count = 0;
    loadingEl.textContent = "動画取得中...";
    do {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${token}`);
      const data = await res.json();
      items = items.concat(data.items || []);
      token = data.nextPageToken;
      count++;
      loadingEl.textContent = `取得中... ${items.length}本`;
    } while (token && count < 20);
    return items;
  }

  function renderAllVideos(items) {
    videosContainer.innerHTML = "";
    allVideoItems = [];
    const fragment = document.createDocumentFragment();

    items.forEach(item => {
      const title = item.snippet.title;
      const videoId = item.snippet.resourceId.videoId;
      if (!videoId) return;

      const div = document.createElement("div");
      div.className = "video-item";
      div.dataset.id = videoId;
      div.dataset.title = title;
      allVideoItems.push(div);

      div.innerHTML = `
        <div class="thumbnail">
          <img src="${item.snippet.thumbnails.medium.url}" loading="lazy">
          <div class="play-btn">▶</div>
          
          <!-- サムネイル上にボタン配置 -->
          <div class="thumbnail-buttons">
            <button class="action-btn later-btn">後で見る</button>
            <button class="action-btn copy-btn">🔗 リンク</button>
          </div>
        </div>
        <div class="video-title">
          ${title}
        </div>
      `;

      div.onclick = (e) => {
        if (!e.target.classList.contains('action-btn')) {
          playVideo(videoId, title, div);
        }
      };

      div.querySelector('.copy-btn').onclick = (e) => { 
        e.stopPropagation(); 
        copyLink(videoId); 
      };
      div.querySelector('.later-btn').onclick = (e) => { 
        e.stopPropagation(); 
        saveLater({id: videoId, title}); 
      };

      fragment.appendChild(div);
    });

    videosContainer.appendChild(fragment);
    loadingEl.style.display = "none";
  }

  async function main() {
    try {
      const items = await fetchAllVideos();
      renderAllVideos(items);
      renderSimpleList(historyBox, loadHistory());
      renderSimpleList(laterBox, loadLater(), true);
      updateSidebar();
    } catch (e) {
      loadingEl.innerHTML = `<p style="color:red">読み込みエラー</p>`;
    }
  }

  toggleHistoryBtn.addEventListener("click", toggleHistory);
  toggleLaterBtn.addEventListener("click", toggleLater);

  document.getElementById("clearHistoryBtn").addEventListener("click", () => {
    if (confirm("再生履歴をすべて削除しますか？")) {
      localStorage.removeItem(historyKey);
      renderSimpleList(historyBox, []);
    }
  });

  document.getElementById("clearLaterBtn").addEventListener("click", () => {
    if (confirm("後で見るリストをすべて削除しますか？")) {
      localStorage.removeItem(laterKey);
      renderSimpleList(laterBox, [], true);
    }
  });

  main();
</script>
</body>
</html>
