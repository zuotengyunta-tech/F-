<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>おすすめチャンネル集 - Playlist Viewer</title>
  <style>
    :root {
      --player-width: 45%;
      --player-height: 65vh;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      scroll-behavior: smooth;
      background: #f8f8f8;
      overflow: hidden;
    }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      padding: 15px 15px 15px 0;
      gap: 15px;
    }

    /* サイドバー */
    #sidebar {
      width: 0;
      overflow: hidden;
      background: white;
      border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      transition: width 0.4s ease;
      height: fit-content;
      align-self: flex-start;
      padding: 15px;
      z-index: 10;
    }
    #sidebar.open { width: 360px; }

    #toggle-container {
      position: fixed;
      left: -2px;
      top: 20px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #toggleHistoryBtn, #toggleLaterBtn {
      width: 56px; height: 56px;
      background: #0f0f0f;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.55);
      transition: all 0.3s ease;
    }
    #toggleHistoryBtn:hover, #toggleLaterBtn:hover {
      background: #000; transform: scale(1.18) translateX(2px);
    }

    #main {
      flex: 1;
      display: flex;
      gap: 15px;
      max-width: 1400px;
      width: 100%;
    }
    #player-area {
      width: var(--player-width);
      height: var(--player-height);
      flex-shrink: 0;
      position: relative;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    #thumbnail-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 100vh;
      position: relative;
    }

    #videos-wrapper {
      flex: 1;
      overflow-y: auto;
      padding-right: 25px;
      position: relative;
      scroll-behavior: smooth;
    }
    #videos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .video-item:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

    .thumbnail img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }
    .play-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60px; height: 60px; background: rgba(0,0,0,0.78); color: white;
      border-radius: 50%; display: grid; place-items: center; font-size: 32px;
    }
    .play-btn:hover { background: #ff0000; }

    .video-title {
      padding: 10px 12px 12px;
      font-size: 14px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      padding-right: 115px;
    }

    .copy-btn, .later-btn {
      position: absolute; top: 50%;
      background: rgba(0,0,0,0.85); color: white;
      border: none; padding: 4px 9px; font-size: 11px;
      border-radius: 4px; cursor: pointer; z-index: 25;
      opacity: 0; transition: all 0.2s;
    }
    .copy-btn { right: 12px; transform: translateY(-50%); }
    .later-btn { right: 68px; transform: translateY(-50%); }
    .video-item:hover .copy-btn, .video-item:hover .later-btn { opacity: 1; }

    .fixed-buttons {
      position: fixed;
      right: 35px;        /* サイドバーに被らないように調整 */
      bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 200;
    }
    .fixed-btn {
      padding: 13px 26px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.45);
      transition: all 0.2s;
    }
    .fixed-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.5);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }

    #loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div id="toggle-container">
    <button id="toggleHistoryBtn">›</button>
    <button id="toggleLaterBtn">›</button>
  </div>

  <div id="sidebar">
    <div class="sidebar-section" id="historySection">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3>再生履歴</h3>
        <button id="clearHistoryBtn">全削除</button>
      </div>
      <div id="history"></div>
    </div>
    <hr style="border: none; border-top: 3px solid #eee; margin: 15px 0 25px 0;">
    <div class="sidebar-section" id="laterSection">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3>後で見る</h3>
        <button id="clearLaterBtn">全削除</button>
      </div>
      <div id="later"></div>
    </div>
  </div>

  <div id="main">
    <div id="player-area">
      <div id="player"></div>
      <div id="player-horizontal-handle"></div>
      <div id="vertical-resize-bar"></div>
    </div>
    <div id="resize-bar"></div>

    <div id="thumbnail-area">
      <h2>おすすめチャンネル集（5ch追加・2分以内＆ショート除外）</h2>
      <select id="channel-filter">
        <option value="">すべてのチャンネル</option>
      </select>
      <div id="search-container">
        <input type="text" id="searchInput" placeholder="動画タイトルで検索...">
        <button id="clearSearchBtn">×</button>
      </div>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading">チャンネルから動画を取得中...（少しずつ表示します）</div>
      </div>
    </div>
  </div>

  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ サムネイル一番上に戻る</button>
  </div>

<script>
  const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const playlists = [
    { name: "Fラン大学就職チャンネル", id: "UUqRV_ZIQhVKfxG1_WkNiRbg" },
    { name: "トレトレチャンネル", id: "UUmD3ZX3hXhihuzVRVe5o27g" },
    { name: "rの住人ピエロ【哲学】", id: "UUY92Ma2-tzt8LLqodw9UF0g" },
    { name: "RECODE - 知性OSの再定義", id: "UUxeOH32jDFcRBV1D2lh7eFQ" },
    { name: "Paranoia_パラノイア（クリス・ヴォス）", id: "UU0PotgTwYxbOZuM9FbWKdcg" },
    { name: "かもなべ塾講師チャンネル", id: "UUT3s5ZjtUhg-TDI-hDYbTyA" }
  ];

  const historyKey = "multi_channel_history";
  const laterKey = "multi_channel_later";

  // DOM要素
  const sidebar = document.getElementById("sidebar");
  const toggleHistoryBtn = document.getElementById("toggleHistoryBtn");
  const toggleLaterBtn = document.getElementById("toggleLaterBtn");
  const historyBox = document.getElementById("history");
  const laterBox = document.getElementById("later");
  const player = document.getElementById("player");
  const videosContainer = document.getElementById("videos");
  const loadingEl = document.getElementById("loading");
  const jumpBtn = document.getElementById("jumpBtn");
  const topBtn = document.getElementById("topBtn");
  const searchInput = document.getElementById("searchInput");
  const channelFilter = document.getElementById("channel-filter");

  let currentActive = null;
  let isHistoryVisible = false;
  let isLaterVisible = false;
  let allVideoElements = [];

  function updateSidebar() {
    const shouldOpen = isHistoryVisible || isLaterVisible;
    sidebar.classList.toggle("open", shouldOpen);
    toggleHistoryBtn.textContent = isHistoryVisible ? "‹" : "›";
    toggleLaterBtn.textContent = isLaterVisible ? "‹" : "›";
    document.getElementById("historySection").style.display = isHistoryVisible ? "block" : "none";
    document.getElementById("laterSection").style.display = isLaterVisible ? "block" : "none";
  }

  function toggleHistory() { isHistoryVisible = !isHistoryVisible; updateSidebar(); }
  function toggleLater() { isLaterVisible = !isLaterVisible; updateSidebar(); }

  // History & Later（維持）
  function loadHistory() { return JSON.parse(localStorage.getItem(historyKey) || "[]"); }
  function saveHistory(video) {
    let history = loadHistory();
    history = history.filter(item => item.id !== video.id);
    history.unshift(video);
    history = history.slice(0, 30);
    localStorage.setItem(historyKey, JSON.stringify(history));
    renderHistory();
  }
  function renderHistory() {
    const history = loadHistory();
    historyBox.innerHTML = history.length === 0 ? '<p style="color:#888; text-align:center; padding:30px 10px;">履歴はありません</p>' : "";
    history.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.textContent = item.title;
      div.onclick = () => document.querySelector(`[data-id="${item.id}"]`)?.scrollIntoView({behavior:"smooth", block:"center"});
      historyBox.appendChild(div);
    });
  }

  function loadLater() { return JSON.parse(localStorage.getItem(laterKey) || "[]"); }
  function saveLater(video) {
    let later = loadLater();
    if (later.some(item => item.id === video.id)) return;
    later.unshift(video);
    localStorage.setItem(laterKey, JSON.stringify(later));
    renderLater();
  }
  function renderLater() {
    const laterList = loadLater();
    laterBox.innerHTML = laterList.length === 0 ? '<p style="color:#888; text-align:center; padding:30px 10px;">後で見るリストは空です</p>' : "";
    laterList.forEach(item => {
      const div = document.createElement("div");
      div.className = "later-item";
      div.innerHTML = `${item.title} <span style="float:right; color:#f44336; cursor:pointer; font-size:12px;" onclick="event.stopImmediatePropagation(); removeLater('${item.id}')">×</span>`;
      div.onclick = () => document.querySelector(`[data-id="${item.id}"]`)?.scrollIntoView({behavior:"smooth", block:"center"});
      laterBox.appendChild(div);
    });
  }

  function clearHistory() { if(confirm("再生履歴をすべて削除しますか？")) { localStorage.removeItem(historyKey); renderHistory(); }}
  function clearLaterList() { if(confirm("後で見るリストをすべて削除しますか？")) { localStorage.removeItem(laterKey); renderLater(); }}
  function removeLater(videoId) {
    let later = loadLater().filter(item => item.id !== videoId);
    localStorage.setItem(laterKey, JSON.stringify(later));
    renderLater();
  }

  function playVideo(videoId, title, videoItemElement) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    if (currentActive) currentActive.classList.remove("active");
    videoItemElement.classList.add("active");
    currentActive = videoItemElement;
    saveHistory({ id: videoId, title });
  }

  function copyLink(videoId) {
    navigator.clipboard.writeText(`https://www.youtube.com/watch?v=${videoId}`);
    // 簡易フィードバック
    const btn = event.currentTarget;
    const orig = btn.textContent;
    btn.textContent = "✓";
    setTimeout(() => btn.textContent = orig, 1500);
  }

  function addToLater(videoId, title) {
    saveLater({ id: videoId, title });
    const btn = event.currentTarget;
    btn.textContent = "✓";
    setTimeout(() => btn.textContent = "後で見る", 1200);
  }

  function filterVideos() {
    const keyword = searchInput.value.toLowerCase().trim();
    const selected = channelFilter.value;
    let count = 0;
    allVideoElements.forEach(item => {
      const matchTitle = !keyword || item.querySelector('.video-title').textContent.toLowerCase().includes(keyword);
      const matchChannel = !selected || item.dataset.channel === selected;
      item.style.display = (matchTitle && matchChannel) ? "" : "none";
      if (matchTitle && matchChannel) count++;
    });
  }

  // ==================== 高速化・軽量化対応 ====================
  async function getVideoDurations(videoIds) {
    if (!videoIds.length) return {};
    const durations = {};
    for (let i = 0; i < videoIds.length; i += 50) {
      const batch = videoIds.slice(i, i + 50);
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${batch.join(',')}&key=${apiKey}`);
        if (res.ok) {
          const data = await res.json();
          data.items?.forEach(item => {
            durations[item.id] = parseISO8601Duration(item.contentDetails.duration);
          });
        }
      } catch(e) {}
    }
    return durations;
  }

  function parseISO8601Duration(d) {
    const m = d.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
    return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
  }

  async function fetchAllVideosFromPlaylist(playlistId) {
    let items = [], pageToken = "";
    do {
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`);
        if (!res.ok) break;
        const data = await res.json();
        items = items.concat(data.items || []);
        pageToken = data.nextPageToken;
      } catch(e) { break; }
    } while (pageToken);
    return items;
  }

  async function main() {
    loadingEl.textContent = "動画を少しずつ取得・表示しています...";
    videosContainer.innerHTML = "";

    playlists.forEach(pl => {
      const opt = document.createElement("option");
      opt.value = pl.name;
      opt.textContent = pl.name;
      channelFilter.appendChild(opt);
    });

    for (const pl of playlists) {
      try {
        const items = await fetchAllVideosFromPlaylist(pl.id);
        const videoIds = items.map(i => i.snippet.resourceId?.videoId).filter(Boolean);
        const durations = await getVideoDurations(videoIds);

        for (const item of items) {
          const videoId = item.snippet.resourceId?.videoId;
          if (!videoId) continue;

          const duration = durations[videoId] || 0;
          if (duration > 0 && duration <= 120) continue;

          const titleLower = item.snippet.title.toLowerCase();
          if (/short|ショート|ショーツ|1分|60秒|tiktok/.test(titleLower)) continue;

          const title = `[${pl.name}] ${item.snippet.title}`;
          const thumb = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url;

          const div = document.createElement("div");
          div.className = "video-item";
          div.dataset.id = videoId;
          div.dataset.channel = pl.name;
          div.innerHTML = `
            <div class="thumbnail">
              <img src="${thumb}" loading="lazy">
              <div class="play-btn">▶</div>
            </div>
            <div class="video-title">
              ${title}
              <button class="later-btn">後で見る</button>
              <button class="copy-btn">🔗</button>
            </div>
          `;

          div.onclick = (e) => {
            if (!['copy-btn','later-btn'].some(cls => e.target.classList.contains(cls))) {
              playVideo(videoId, title, div);
            }
          };
          div.querySelector('.copy-btn').onclick = (e) => { e.stopPropagation(); copyLink(videoId); };
          div.querySelector('.later-btn').onclick = (e) => { e.stopPropagation(); addToLater(videoId, title); };

          videosContainer.appendChild(div);
          allVideoElements.push(div);
        }
      } catch(e) {
        console.error(pl.name + " 取得失敗", e);
      }
    }

    loadingEl.style.display = "none";
    renderHistory();
    renderLater();
    updateSidebar();

    channelFilter.addEventListener("change", filterVideos);
    searchInput.addEventListener("input", filterVideos);
  }

  // ボタン
  jumpBtn.addEventListener("click", () => currentActive?.scrollIntoView({behavior:"smooth", block:"center"}));
  topBtn.addEventListener("click", () => document.getElementById("videos-wrapper").scrollTo({top:0, behavior:"smooth"}));

  toggleHistoryBtn.addEventListener("click", toggleHistory);
  toggleLaterBtn.addEventListener("click", toggleLater);
  document.getElementById("clearHistoryBtn").addEventListener("click", clearHistory);
  document.getElementById("clearLaterBtn").addEventListener("click", clearLaterList);

  // リサイズ機能（完全版）
  function initResize() {
    const resizeBar = document.getElementById("resize-bar");
    const playerHorizontalHandle = document.getElementById("player-horizontal-handle");
    const verticalResizeBar = document.getElementById("vertical-resize-bar");
    const playerArea = document.getElementById("player-area");
    let isResizingH = false, isResizingV = false;

    const startH = (e) => { isResizingH = true; document.body.style.cursor = "col-resize"; };
    const startV = (e) => { isResizingV = true; document.body.style.cursor = "row-resize"; };

    resizeBar.addEventListener("mousedown", startH);
    playerHorizontalHandle.addEventListener("mousedown", startH);
    verticalResizeBar.addEventListener("mousedown", startV);

    document.addEventListener("mousemove", (e) => {
      if (isResizingH) {
        const rect = document.getElementById("main").getBoundingClientRect();
        let percent = ((e.clientX - rect.left) / rect.width) * 100;
        percent = Math.max(25, Math.min(70, percent));
        document.documentElement.style.setProperty("--player-width", percent + "%");
      }
      if (isResizingV) {
        const rect = playerArea.getBoundingClientRect();
        let newH = Math.max(280, Math.min(window.innerHeight * 0.92, e.clientY - rect.top));
        document.documentElement.style.setProperty("--player-height", (newH / window.innerHeight * 100) + "vh");
      }
    });

    document.addEventListener("mouseup", () => {
      isResizingH = isResizingV = false;
      document.body.style.cursor = "default";
    });
  }

  initResize();
  main();
</script>
</body>
</html>
