<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Frann｜動画一覧</title>
  <style>
    :root {
      --player-width: 46%;
      --player-height: 68vh;
    }
    html, body {
      margin: 0; padding: 0; height: 100%; scroll-behavior: smooth;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      display: flex;
      padding: 15px;
      gap: 12px;
    }

    /* 再生履歴サイドバー */
    #sidebar {
      width: 0; overflow: hidden; background: white; border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: width 0.4s ease;
      height: fit-content; align-self: flex-start;
    }
    #sidebar.open { width: 340px; padding: 15px; }

    #toggleHistoryBtn {
      position: fixed; left: 15px; top: 25px;
      width: 32px; height: 32px;
      background: #333; color: white;
      border: none; border-radius: 50%; font-size: 18px;
      cursor: pointer; z-index: 300;
    }

    /* メインエリア */
    #main {
      flex: 1;
      display: flex;
      gap: 10px;
      width: 100%;
    }

    /* プレイヤーエリア */
    #player-area {
      width: var(--player-width);
      height: var(--player-height);
      flex-shrink: 0;
      position: relative;
      min-width: 340px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }

    #player-horizontal-handle {
      position: absolute; top: 0; right: -4px; width: 9px; height: 100%;
      cursor: col-resize; z-index: 220;
    }
    #vertical-resize-bar {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 8px;
      background: #ddd; cursor: row-resize; z-index: 230;
    }
    #vertical-resize-bar:hover, #vertical-resize-bar.active { background: #ff0000; }

    #resize-bar {
      width: 6px; background: #ddd; cursor: col-resize; z-index: 100;
    }
    #resize-bar:hover, #resize-bar.active { background: #ff0000; }

    /* サムネイルエリア（右端まで詰め・4列） */
    #thumbnail-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 100vh;
    }
    h2 { 
      margin: 0 0 10px 0; 
      text-align: center; 
      font-size: 26px; 
      color: #333;
    }
    #videos-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 0 6px 30px 4px;
    }
    #videos {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      width: 100%;
    }

    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }
    .video-item:hover { transform: translateY(-4px); }
    .thumbnail { position: relative; cursor: pointer; }
    .thumbnail img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    .play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 54px; height: 54px;
      background: rgba(0,0,0,0.8);
      color: white;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 28px;
    }
    .active { outline: 4px solid #ff0000; outline-offset: -4px; }

    /* 右下ボタン */
    .fixed-buttons {
      position: fixed;
      right: 25px;
      bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }
    .fixed-btn {
      padding: 12px 22px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(0,0,0,0.35);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }
  </style>
</head>
<body>
  <button id="toggleHistoryBtn">›</button>

  <div id="sidebar">
    <div id="sidebar-header">
      <h3>再生履歴</h3>
      <button id="clearHistoryBtn">全削除</button>
    </div>
    <div id="history"></div>
  </div>

  <div id="main">
    <!-- 左：プレイヤー -->
    <div id="player-area">
      <div id="player"></div>
      <div id="player-horizontal-handle"></div>
      <div id="vertical-resize-bar"></div>
    </div>

    <!-- 左右リサイズバー -->
    <div id="resize-bar"></div>

    <!-- 右：サムネイル一覧 -->
    <div id="thumbnail-area">
      <h2>Frann｜動画一覧</h2>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading">動画を読み込み中...</div>
      </div>
    </div>
  </div>

  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ サムネイル一番上に戻る</button>
  </div>

<script>
  const API_KEY = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const CHANNEL_ID = "UCqRV_ZIQhVKfxG1_WkNiRbg";

  const sidebar = document.getElementById("sidebar");
  const toggleHistoryBtn = document.getElementById("toggleHistoryBtn");
  const clearHistoryBtn = document.getElementById("clearHistoryBtn");
  const historyBox = document.getElementById("history");
  const playerArea = document.getElementById("player-area");
  const player = document.getElementById("player");
  const resizeBar = document.getElementById("resize-bar");
  const playerHorizontalHandle = document.getElementById("player-horizontal-handle");
  const verticalResizeBar = document.getElementById("vertical-resize-bar");
  const videosContainer = document.getElementById("videos");
  const videosWrapper = document.getElementById("videos-wrapper");
  const loadingEl = document.getElementById("loading");
  const jumpBtn = document.getElementById("jumpBtn");
  const topBtn = document.getElementById("topBtn");

  let currentActive = null;
  let currentVideoEl = null;
  let isHistoryOpen = false;

  // 履歴機能
  function loadHistory() { return JSON.parse(localStorage.getItem("frann_history") || "[]"); }
  function saveHistory(video) {
    let history = loadHistory();
    history = history.filter(item => item.id !== video.id);
    history.unshift(video);
    history = history.slice(0, 30);
    localStorage.setItem("frann_history", JSON.stringify(history));
    renderHistory();
  }
  function renderHistory() {
    const history = loadHistory();
    historyBox.innerHTML = history.length === 0
      ? '<p style="color:#888; text-align:center; padding:30px 10px;">履歴はありません</p>'
      : "";
    history.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.textContent = item.title;
      div.onclick = () => document.querySelector(`[data-id="${item.id}"]`)?.scrollIntoView({behavior:"smooth", block:"center"});
      historyBox.appendChild(div);
    });
  }
  function clearHistory() {
    if (confirm("再生履歴をすべて削除しますか？")) {
      localStorage.removeItem("frann_history");
      renderHistory();
    }
  }
  function toggleHistory() {
    isHistoryOpen = !isHistoryOpen;
    sidebar.classList.toggle("open", isHistoryOpen);
    toggleHistoryBtn.textContent = isHistoryOpen ? "‹" : "›";
  }

  // 動画再生
  function playVideo(videoId, title, videoItemElement) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    if (currentActive) currentActive.classList.remove("active");
    videoItemElement.classList.add("active");
    currentActive = videoItemElement;
    currentVideoEl = videoItemElement;
    saveHistory({ id: videoId, title });
  }

  // チャンネル全動画取得
  async function getUploadsPlaylistId() {
    const url = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    return data.items[0].contentDetails.relatedPlaylists.uploads;
  }

  async function getAllVideos(playlistId) {
    let videos = [];
    let token = "";
    while (true) {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}${token ? `&pageToken=${token}` : ""}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.items) videos.push(...data.items);
      if (!data.nextPageToken) break;
      token = data.nextPageToken;
    }
    return videos;
  }

  function renderVideos(videos) {
    videosContainer.innerHTML = "";
    videos.forEach(v => {
      const snip = v.snippet;
      const videoId = snip.resourceId.videoId;
      if (!videoId) return;
      const thumb = snip.thumbnails?.medium?.url || snip.thumbnails?.high?.url || "";
      const title = snip.title;

      const div = document.createElement("div");
      div.className = "video-item";
      div.dataset.id = videoId;
      div.innerHTML = `
        <div class="thumbnail">
          <img src="${thumb}" loading="lazy">
          <div class="play-btn">▶</div>
        </div>
        <p style="margin:10px; font-size:14px; line-height:1.4;">${title}</p>
      `;
      div.querySelector('.play-btn').onclick = (e) => {
        e.stopPropagation();
        playVideo(videoId, title, div);
      };
      videosContainer.appendChild(div);
    });
    loadingEl.style.display = "none";
  }

  // リサイズ機能
  function initResize() {
    let isH = false, isV = false;

    const startH = () => { isH = true; document.body.style.cursor = "col-resize"; };
    resizeBar.addEventListener("mousedown", startH);
    playerHorizontalHandle.addEventListener("mousedown", startH);

    verticalResizeBar.addEventListener("mousedown", () => { isV = true; document.body.style.cursor = "row-resize"; });

    document.addEventListener("mousemove", (e) => {
      if (isH) {
        const rect = document.getElementById("main").getBoundingClientRect();
        let w = ((e.clientX - rect.left) / rect.width) * 100;
        w = Math.max(28, Math.min(72, w));
        document.documentElement.style.setProperty("--player-width", w + "%");
      }
      if (isV) {
        const rect = playerArea.getBoundingClientRect();
        let h = Math.max(300, Math.min(window.innerHeight * 0.93, e.clientY - rect.top));
        document.documentElement.style.setProperty("--player-height", (h / window.innerHeight * 100) + "vh");
      }
    });

    document.addEventListener("mouseup", () => {
      isH = isV = false;
      document.body.style.cursor = "default";
    });
  }

  // メイン処理
  async function main() {
    try {
      loadingEl.textContent = "チャンネル動画を読み込み中...";
      const playlistId = await getUploadsPlaylistId();
      let videos = await getAllVideos(playlistId);
      videos.sort((a, b) => new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt));
      renderVideos(videos);
      renderHistory();
    } catch (e) {
      loadingEl.innerHTML = `<span style="color:red;">取得エラー</span>`;
      console.error(e);
    }
  }

  // イベント設定
  toggleHistoryBtn.addEventListener("click", toggleHistory);
  clearHistoryBtn.addEventListener("click", clearHistory);
  jumpBtn.onclick = () => currentVideoEl?.scrollIntoView({behavior:"smooth", block:"center"});
  topBtn.onclick = () => videosWrapper.scrollTo({top:0, behavior:"smooth"});

  initResize();
  main();
</script>
</body>
</html>
