<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>おすすめチャンネル集 - Playlist Viewer</title>
  <style>
    :root {
      --player-width: 45%;
      --player-height: 65vh;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      scroll-behavior: smooth;
      background: #f8f8f8;
      overflow: hidden;
    }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      padding: 15px 15px 15px 0;
      gap: 15px;
    }

    /* サイドバー */
    #sidebar {
      width: 0;
      overflow: hidden;
      background: white;
      border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      transition: width 0.4s ease;
      height: fit-content;
      align-self: flex-start;
      padding: 15px;
      z-index: 100;
    }
    #sidebar.open { width: 360px; }

    #toggle-container {
      position: fixed;
      left: -2px;
      top: 20px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #toggleHistoryBtn, #toggleLaterBtn {
      width: 56px;
      height: 56px;
      background: #0f0f0f;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.55);
      transition: all 0.3s ease;
    }
    #toggleHistoryBtn:hover, #toggleLaterBtn:hover {
      background: #000000;
      transform: scale(1.18) translateX(2px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.7);
    }

    #main {
      flex: 1;
      display: flex;
      gap: 15px;
      max-width: 1400px;
      width: 100%;
    }

    #player-area {
      width: var(--player-width);
      height: var(--player-height);
      flex-shrink: 0;
      align-self: flex-start;
      position: relative;
      min-width: 320px;
      max-width: 70%;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    #player-horizontal-handle { position: absolute; top: 0; right: -4px; width: 9px; height: 100%; background: transparent; cursor: col-resize; z-index: 220; }
    #vertical-resize-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: #ddd; cursor: row-resize; z-index: 230; transition: background 0.2s; }
    #vertical-resize-bar:hover, #vertical-resize-bar.active { background: #ff0000; }
    #resize-bar { width: 6px; background: #ddd; cursor: col-resize; border-radius: 3px; margin: 0 -3px; z-index: 100; transition: background 0.2s; }
    #resize-bar:hover, #resize-bar.active { background: #ff0000; }

    #thumbnail-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 100vh;
      position: relative;
    }

    h2 { margin: 0 0 8px 0; text-align: center; font-size: 25px; }

    #search-container { margin-bottom: 18px; position: relative; }
    #searchInput {
      width: 100%;
      padding: 12px 40px 12px 16px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
    }
    #searchInput:focus { border-color: #ff0000; outline: none; }
    #clearSearchBtn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 20px;
      color: #888;
      cursor: pointer;
      display: none;
    }
    #clearSearchBtn:hover { color: #ff0000; }

    #channel-filter {
      margin-bottom: 12px;
      padding: 10px 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      width: 100%;
      background: white;
    }
    #channel-filter:focus { border-color: #ff0000; outline: none; }

    #videos-wrapper {
      flex: 1;
      overflow-y: auto;
      padding-right: 80px;
      position: relative;
      scroll-behavior: smooth;
    }
    #videos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      position: relative;
    }
    .video-item:hover { transform: translateY(-4px); }

    .thumbnail { position: relative; cursor: pointer; }
    .thumbnail img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }

    .play-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60px; height: 60px; background: rgba(0,0,0,0.78); color: white;
      border-radius: 50%; display: grid; place-items: center; font-size: 32px;
    }
    .play-btn:hover { background: #ff0000; }

    /* タイトル改善 */
    .video-title {
      padding: 12px 12px 12px 12px;
      font-size: 14px;
      line-height: 1.38;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      position: relative;
      min-height: 78px;
    }

    .copy-btn, .later-btn {
      position: absolute;
      top: 10px;
      background: rgba(0,0,0,0.85);
      color: white;
      border: none;
      padding: 5px 10px;
      font-size: 11.5px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 30;
      opacity: 0;
      transition: all 0.25s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .later-btn { right: 12px; }
    .copy-btn { right: 72px; }

    .video-item:hover .copy-btn,
    .video-item:hover .later-btn {
      opacity: 1;
    }
    .copy-btn:hover { background: #4caf50; }
    .later-btn:hover { background: #ff9800; }

    .active { outline: 4px solid #ff0000; outline-offset: -4px; }

    /* 履歴・後で見る（もっさり対策強化） */
    .history-item, .later-item {
      padding: 11px 12px;
      margin-bottom: 8px;
      background: #f9f9f9;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      cursor: pointer;
      transition: all 0.2s ease;
      word-break: break-all;
    }
    .history-item:hover, .later-item:hover {
      background: #f0f0f0;
      transform: translateX(4px);
    }
    .later-item {
      background: #fff8e1;
    }

    .fixed-buttons {
      position: fixed;
      right: 75px;
      bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 500;
    }
    .fixed-btn {
      padding: 13px 26px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,0,0,0.55);
      transition: all 0.2s;
    }
    .fixed-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }

    #loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="toggle-container">
    <button id="toggleHistoryBtn">›</button>
    <button id="toggleLaterBtn">›</button>
  </div>

  <div id="sidebar">
    <div class="sidebar-section" id="historySection">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3>再生履歴</h3>
        <button id="clearHistoryBtn">全削除</button>
      </div>
      <div id="history"></div>
    </div>
    <hr style="border: none; border-top: 3px solid #eee; margin: 15px 0 25px 0;">
    <div class="sidebar-section" id="laterSection">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3>後で見る</h3>
        <button id="clearLaterBtn">全削除</button>
      </div>
      <div id="later"></div>
    </div>
  </div>

  <div id="main">
    <div id="player-area">
      <div id="player"></div>
      <div id="player-horizontal-handle"></div>
      <div id="vertical-resize-bar"></div>
    </div>
    <div id="resize-bar"></div>
    <div id="thumbnail-area">
      <h2>おすすめチャンネル集（5ch追加・2分以内＆ショート除外）</h2>
      <select id="channel-filter">
        <option value="">すべてのチャンネル</option>
      </select>
      <div id="search-container">
        <input type="text" id="searchInput" placeholder="動画タイトルで検索...">
        <button id="clearSearchBtn">×</button>
      </div>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading">全チャンネルを並列取得中...（高速モード）</div>
      </div>
    </div>
  </div>

  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ サムネイル一番上に戻る</button>
  </div>

<script>
  const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const playlists = [
    { name: "Fラン大学就職チャンネル", id: "UUqRV_ZIQhVKfxG1_WkNiRbg" },
    { name: "トレトレチャンネル", id: "UUmD3ZX3hXhihuzVRVe5o27g" },
    { name: "rの住人ピエロ【哲学】", id: "UUY92Ma2-tzt8LLqodw9UF0g" },
    { name: "RECODE - 知性OSの再定義", id: "UUxeOH32jDFcRBV1D2lh7eFQ" },
    { name: "Paranoia_パラノイア（クリス・ヴォス）", id: "UU0PotgTwYxbOZuM9FbWKdcg" },
    { name: "かもなべ塾講師チャンネル", id: "UUT3s5ZjtUhg-TDI-hDYbTyA" }
  ];

  const historyKey = "multi_channel_history";
  const laterKey = "multi_channel_later";

  const sidebar = document.getElementById("sidebar");
  const toggleHistoryBtn = document.getElementById("toggleHistoryBtn");
  const toggleLaterBtn = document.getElementById("toggleLaterBtn");
  const historySection = document.getElementById("historySection");
  const laterSection = document.getElementById("laterSection");
  const clearHistoryBtn = document.getElementById("clearHistoryBtn");
  const clearLaterBtn = document.getElementById("clearLaterBtn");
  const historyBox = document.getElementById("history");
  const laterBox = document.getElementById("later");
  const player = document.getElementById("player");
  const videosContainer = document.getElementById("videos");
  const loadingEl = document.getElementById("loading");
  const jumpBtn = document.getElementById("jumpBtn");
  const topBtn = document.getElementById("topBtn");
  const searchInput = document.getElementById("searchInput");
  const clearSearchBtn = document.getElementById("clearSearchBtn");
  const channelFilter = document.getElementById("channel-filter");

  let currentActive = null;
  let isHistoryVisible = false;
  let isLaterVisible = false;
  let allVideoElements = [];

  function updateSidebar() {
    const shouldOpen = isHistoryVisible || isLaterVisible;
    sidebar.classList.toggle("open", shouldOpen);
    toggleHistoryBtn.textContent = isHistoryVisible ? "‹" : "›";
    toggleLaterBtn.textContent = isLaterVisible ? "‹" : "›";
    historySection.style.display = isHistoryVisible ? "block" : "none";
    laterSection.style.display = isLaterVisible ? "block" : "none";
  }

  function toggleHistory() { isHistoryVisible = !isHistoryVisible; updateSidebar(); }
  function toggleLater() { isLaterVisible = !isLaterVisible; updateSidebar(); }

  function loadHistory() { return JSON.parse(localStorage.getItem(historyKey) || "[]"); }
  function loadLater() { return JSON.parse(localStorage.getItem(laterKey) || "[]"); }

  function saveHistory(video) {
    let history = loadHistory();
    history = history.filter(item => item.id !== video.id);
    history.unshift(video);
    history = history.slice(0, 30);
    localStorage.setItem(historyKey, JSON.stringify(history));
    renderHistory();
  }

  function saveLater(video) {
    let later = loadLater();
    if (later.some(item => item.id === video.id)) return;
    later.unshift(video);
    localStorage.setItem(laterKey, JSON.stringify(later));
    renderLater();
  }

  function removeLater(videoId) {
    let later = loadLater().filter(item => item.id !== videoId);
    localStorage.setItem(laterKey, JSON.stringify(later));
    renderLater();
  }

  // 履歴・後で見るの高速レンダリング
  function renderHistory() {
    const history = loadHistory();
    historyBox.innerHTML = history.length === 0 
      ? '<p style="color:#888; text-align:center; padding:30px 10px;">履歴はありません</p>' 
      : "";

    const fragment = document.createDocumentFragment();
    history.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.textContent = item.title;
      div.onclick = () => {
        const target = document.querySelector(`[data-id="${item.id}"]`);
        if (target) {
          target.scrollIntoView({behavior:"smooth", block:"center"});
          setTimeout(() => target.click(), 300);
        }
      };
      fragment.appendChild(div);
    });
    historyBox.appendChild(fragment);
  }

  function renderLater() {
    const laterList = loadLater();
    laterBox.innerHTML = laterList.length === 0 
      ? '<p style="color:#888; text-align:center; padding:30px 10px;">後で見るリストは空です</p>' 
      : "";

    const fragment = document.createDocumentFragment();
    laterList.forEach(item => {
      const div = document.createElement("div");
      div.className = "later-item";
      div.innerHTML = `${item.title}<span style="float:right; color:#f44336; cursor:pointer; font-size:13px;" onclick="event.stopImmediatePropagation(); removeLater('${item.id}')">×</span>`;
      div.onclick = () => {
        const target = document.querySelector(`[data-id="${item.id}"]`);
        if (target) {
          target.scrollIntoView({behavior:"smooth", block:"center"});
          setTimeout(() => target.click(), 300);
        }
      };
      fragment.appendChild(div);
    });
    laterBox.appendChild(fragment);
  }

  function clearHistory() {
    if (confirm("再生履歴をすべて削除しますか？")) {
      localStorage.removeItem(historyKey);
      renderHistory();
    }
  }

  function clearLaterList() {
    if (confirm("後で見るリストをすべて削除しますか？")) {
      localStorage.removeItem(laterKey);
      renderLater();
    }
  }

  function playVideo(videoId, title, videoItemElement) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    if (currentActive) currentActive.classList.remove("active");
    videoItemElement.classList.add("active");
    currentActive = videoItemElement;
    saveHistory({ id: videoId, title });
  }

  function copyLink(videoId) {
    const url = `https://www.youtube.com/watch?v=${videoId}`;
    navigator.clipboard.writeText(url).then(() => {
      const btn = event.currentTarget;
      const original = btn.textContent;
      btn.textContent = "✓ コピー";
      btn.style.background = "#4caf50";
      setTimeout(() => {
        btn.textContent = original;
        btn.style.background = "rgba(0,0,0,0.85)";
      }, 1600);
    });
  }

  function addToLater(videoId, title) {
    saveLater({ id: videoId, title });
    const btn = event.currentTarget;
    btn.style.background = "#4caf50";
    btn.textContent = "✓ 追加";
    setTimeout(() => {
      btn.style.background = "rgba(0,0,0,0.85)";
      btn.textContent = "後で見る";
    }, 1200);
  }

  function filterVideos() {
    const keyword = searchInput.value.toLowerCase().trim();
    const selectedChannel = channelFilter.value;
    let visibleCount = 0;
    allVideoElements.forEach(item => {
      const titleText = item.querySelector('.video-title').textContent.toLowerCase();
      const channelName = item.dataset.channel || "";
      const matchSearch = keyword === "" || titleText.includes(keyword);
      const matchChannel = selectedChannel === "" || channelName === selectedChannel;
      if (matchSearch && matchChannel) {
        item.style.display = "";
        visibleCount++;
      } else {
        item.style.display = "none";
      }
    });

    let noResults = videosContainer.querySelector('.no-results');
    if (visibleCount === 0 && (keyword !== "" || selectedChannel !== "")) {
      if (!noResults) {
        noResults = document.createElement("div");
        noResults.className = "no-results";
        noResults.textContent = "条件に一致する動画はありません。";
        videosContainer.appendChild(noResults);
      }
    } else if (noResults) {
      noResults.remove();
    }
  }

  // ==================== 高速化強化 ====================
  async function getVideoDurations(videoIds) {
    if (videoIds.length === 0) return {};
    const durations = {};
    // 最大100件ずつバッチ処理に強化
    for (let i = 0; i < videoIds.length; i += 100) {
      const batch = videoIds.slice(i, i + 100);
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${batch.join(',')}&key=${apiKey}`);
        if (res.ok) {
          const data = await res.json();
          (data.items || []).forEach(item => {
            durations[item.id] = parseISO8601Duration(item.contentDetails.duration);
          });
        }
      } catch (e) { console.warn("Duration fetch error", e); }
    }
    return durations;
  }

  function parseISO8601Duration(duration) {
    const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
    let seconds = 0;
    if (match[1]) seconds += parseInt(match[1]) * 3600;
    if (match[2]) seconds += parseInt(match[2]) * 60;
    if (match[3]) seconds += parseInt(match[3]);
    return seconds;
  }

  async function fetchAllVideosFromPlaylist(playlistId) {
    let items = [];
    let pageToken = "";
    do {
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`);
        if (!res.ok) break;
        const data = await res.json();
        if (data.items) items = items.concat(data.items);
        pageToken = data.nextPageToken;
      } catch (e) {
        console.error("Playlist取得エラー", e);
        break;
      }
    } while (pageToken);
    return items;
  }

  async function main() {
    loadingEl.textContent = "チャンネル取得中...（高速並列モード）";
    videosContainer.innerHTML = "";

    // チャンネルフィルタ準備
    playlists.forEach(pl => {
      const option = document.createElement("option");
      option.value = pl.name;
      option.textContent = pl.name;
      channelFilter.appendChild(option);
    });

    // 並列取得をより効率的に
    const fetchPromises = playlists.map(pl => 
      fetchAllVideosFromPlaylist(pl.id).then(items => {
        const videoIds = items.map(item => item.snippet.resourceId?.videoId).filter(Boolean);
        return { pl, items, videoIds };
      })
    );

    const playlistResults = await Promise.all(fetchPromises);

    // すべての動画IDを集めて一括でDuration取得（これが最も効果的）
    const allVideoIds = playlistResults.flatMap(r => r.videoIds);
    const durations = await getVideoDurations(allVideoIds);

    const fragment = document.createDocumentFragment();

    playlistResults.forEach(({ pl, items }) => {
      items.forEach(item => {
        const rawTitle = item.snippet.title;
        const videoId = item.snippet.resourceId?.videoId;
        if (!videoId) return;

        const durationSec = durations[videoId] || 0;
        if (durationSec > 0 && durationSec <= 120) return;

        const lowerTitle = rawTitle.toLowerCase();
        if (lowerTitle.includes("short") || lowerTitle.includes("ショート") ||
            lowerTitle.includes("ショーツ") || lowerTitle.includes("#short") ||
            lowerTitle.includes("1分") || lowerTitle.includes("60秒") ||
            lowerTitle.includes("ティック") || lowerTitle.includes("tiktok")) {
          return;
        }

        const title = `[${pl.name}] ${rawTitle}`;
        const thumbnail = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || "";

        const div = document.createElement("div");
        div.className = "video-item";
        div.dataset.id = videoId;
        div.dataset.channel = pl.name;

        div.innerHTML = `
          <div class="thumbnail">
            <img src="${thumbnail}" loading="lazy" alt="${title}">
            <div class="play-btn">▶</div>
          </div>
          <div class="video-title">
            ${title}
            <button class="later-btn">後で見る</button>
            <button class="copy-btn">🔗</button>
          </div>
        `;

        div.onclick = (e) => {
          if (!e.target.classList.contains('copy-btn') && !e.target.classList.contains('later-btn')) {
            playVideo(videoId, title, div);
          }
        };

        div.querySelector('.copy-btn').onclick = (e) => { e.stopPropagation(); copyLink(videoId); };
        div.querySelector('.later-btn').onclick = (e) => { e.stopPropagation(); addToLater(videoId, title); };

        fragment.appendChild(div);
        allVideoElements.push(div);
      });
    });

    videosContainer.appendChild(fragment);
    loadingEl.style.display = "none";

    // 履歴・後で見るを最後にレンダリング
    renderHistory();
    renderLater();
    updateSidebar();

    channelFilter.addEventListener("change", filterVideos);
    searchInput.addEventListener("input", filterVideos);
    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      filterVideos();
      clearSearchBtn.style.display = "none";
      searchInput.focus();
    });
  }

  // ボタン動作
  jumpBtn.addEventListener("click", () => {
    if (currentActive) currentActive.scrollIntoView({ behavior: "smooth", block: "center" });
  });

  topBtn.addEventListener("click", () => {
    document.getElementById("videos-wrapper").scrollTo({ top: 0, behavior: "smooth" });
  });

  toggleHistoryBtn.addEventListener("click", toggleHistory);
  toggleLaterBtn.addEventListener("click", toggleLater);
  clearHistoryBtn.addEventListener("click", clearHistory);
  clearLaterBtn.addEventListener("click", clearLaterList);

  function initResize() {
    // リサイズ機能（変更なし）
    const resizeBar = document.getElementById("resize-bar");
    const playerHorizontalHandle = document.getElementById("player-horizontal-handle");
    const verticalResizeBar = document.getElementById("vertical-resize-bar");
    const playerArea = document.getElementById("player-area");
    let isResizingHorizontal = false, isResizingVertical = false;

    const startHorizontal = (e) => {
      isResizingHorizontal = true;
      resizeBar.classList.add("active");
      playerHorizontalHandle.style.background = "rgba(255,0,0,0.3)";
      document.body.style.cursor = "col-resize";
      e.preventDefault();
    };

    resizeBar.addEventListener("mousedown", startHorizontal);
    playerHorizontalHandle.addEventListener("mousedown", startHorizontal);

    verticalResizeBar.addEventListener("mousedown", (e) => {
      isResizingVertical = true;
      verticalResizeBar.classList.add("active");
      document.body.style.cursor = "row-resize";
      e.preventDefault();
    });

    document.addEventListener("mousemove", (e) => {
      if (isResizingHorizontal) {
        const mainRect = document.getElementById("main").getBoundingClientRect();
        let newWidth = ((e.clientX - mainRect.left) / mainRect.width) * 100;
        newWidth = Math.max(25, Math.min(70, newWidth));
        document.documentElement.style.setProperty("--player-width", newWidth + "%");
      }
      if (isResizingVertical) {
        const playerRect = playerArea.getBoundingClientRect();
        let newHeightPx = e.clientY - playerRect.top;
        newHeightPx = Math.max(280, Math.min(window.innerHeight * 0.95, newHeightPx));
        const newHeightVh = (newHeightPx / window.innerHeight) * 100;
        document.documentElement.style.setProperty("--player-height", newHeightVh + "vh");
      }
    });

    document.addEventListener("mouseup", () => {
      if (isResizingHorizontal) {
        isResizingHorizontal = false;
        resizeBar.classList.remove("active");
        playerHorizontalHandle.style.background = "transparent";
        document.body.style.cursor = "default";
      }
      if (isResizingVertical) {
        isResizingVertical = false;
        verticalResizeBar.classList.remove("active");
        document.body.style.cursor = "default";
      }
    });
  }

  initResize();
  main();
</script>
</body>
</html>
