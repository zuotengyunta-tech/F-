<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Fラン大学就職チャンネル - Playlist Viewer</title>
  <style>
    :root {
      --player-width: 45%;
      --player-height: 65vh;
      --sidebar-width: 360px;
    }
    html, body {
      margin: 0; padding: 0; height: 100%; scroll-behavior: smooth;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      display: flex;
      padding-left: 60px;
      gap: 15px;
    }

    /* トグルボタン */
    .toggle-btn {
      position: fixed;
      left: 15px;
      width: 36px; height: 36px;
      background: #333; color: white;
      border: none; border-radius: 50%;
      font-size: 20px; cursor: pointer; z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #toggleHistoryBtn { top: 25px; }
    #toggleLaterBtn   { top: 70px; }

    /* サイドバー */
    .sidebar {
      position: fixed;
      left: 60px;
      top: 15px;
      width: 0;
      overflow: hidden;
      background: white;
      border-radius: 12px;
      box-shadow: 3px 0 15px rgba(0,0,0,0.15);
      transition: width 0.35s ease;
      z-index: 400;
      padding: 0 15px;
    }
    .sidebar.open { width: var(--sidebar-width); padding: 15px; }

    #laterSidebar {
      top: auto;
      bottom: 15px;
      left: 60px;
    }

    #sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    h3 { margin: 8px 0 6px 0; font-size: 16px; }
    .section-title { font-size: 15px; color: #555; margin: 16px 0 8px 0; }

    #clearHistoryBtn, #clearLaterBtn {
      font-size: 11px; padding: 4px 10px;
      background: #f44336; color: white;
      border: none; border-radius: 4px; cursor: pointer;
    }

    .history-item, .later-item {
      padding: 10px; margin-bottom: 8px; border-radius: 6px;
      font-size: 14px; cursor: pointer;
    }
    .history-item:hover, .later-item:hover { background: #f5f5f5; }

    /* メイン */
    #main {
      flex: 1;
      display: flex;
      gap: 15px;
      max-width: 1400px;
      width: 100%;
      transition: margin-left 0.35s ease;
    }

    #player-area {
      width: var(--player-width);
      height: var(--player-height);
      flex-shrink: 0;
      position: relative;
      min-width: 320px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }

    #resize-bar, #player-horizontal-handle, #vertical-resize-bar {
      background: #ddd; cursor: col-resize;
    }
    #resize-bar:hover, #resize-bar.active,
    #vertical-resize-bar:hover, #vertical-resize-bar.active { background: #ff0000; }

    #thumbnail-area { flex: 1; display: flex; flex-direction: column; max-height: 100vh; }
    h2 { margin: 0 0 15px 0; text-align: center; font-size: 25px; }

    #search-container { margin-bottom: 15px; padding: 0 5px; }
    #searchInput {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    #searchInput:focus { border-color: #ff0000; box-shadow: 0 0 0 3px rgba(255,0,0,0.1); }

    #videos-wrapper { flex: 1; overflow-y: auto; padding-right: 12px; }
    #videos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }

    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      position: relative;
    }
    .video-item:hover { transform: translateY(-4px); }

    .thumbnail img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px;
      background: rgba(0,0,0,0.78); color: white;
      border-radius: 50%; display: grid; place-items: center;
      font-size: 32px;
    }
    .play-btn:hover { background: #ff0000; }

    .video-title {
      padding: 10px 8px 12px 12px;
      font-size: 14px; line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      position: relative;
      padding-right: 80px;
    }

    .copy-btn, .later-btn {
      position: absolute;
      background: rgba(0,0,0,0.85);
      color: white;
      border: none;
      padding: 4px 9px;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
    }
    .copy-btn { top: 12px; right: 12px; }
    .later-btn { top: 38px; right: 12px; font-size: 10.5px; }
    .video-item:hover .copy-btn,
    .video-item:hover .later-btn { opacity: 1; }
    .later-btn:hover { background: #2196f3; }

    .active { outline: 4px solid #ff0000; outline-offset: -4px; }

    .fixed-buttons {
      position: fixed;
      right: 40px;
      bottom: 35px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }
    .fixed-btn {
      padding: 13px 24px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(0,0,0,0.35);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }
  </style>
</head>
<body>

  <button id="toggleHistoryBtn" class="toggle-btn">›</button>
  <button id="toggleLaterBtn" class="toggle-btn">›</button>

  <div id="historySidebar" class="sidebar">
    <div id="sidebar-header">
      <h3>再生履歴</h3>
      <button id="clearHistoryBtn">全削除</button>
    </div>
    <div id="history"></div>
  </div>

  <div id="laterSidebar" class="sidebar">
    <div class="section-title">後で見る</div>
    <button id="clearLaterBtn">全削除</button>
    <div id="watchLater"></div>
  </div>

  <div id="main">
    <div id="player-area">
      <div id="player"></div>
      <div id="player-horizontal-handle"></div>
      <div id="vertical-resize-bar"></div>
    </div>
    <div id="resize-bar"></div>
    <div id="thumbnail-area">
      <h2>Fラン大学就職チャンネル</h2>
      <div id="search-container">
        <input type="text" id="searchInput" placeholder="動画を検索...（タイトルでフィルタ）" autocomplete="off">
      </div>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading">全動画を読み込み中...（高速化版）</div>
      </div>
    </div>
  </div>

  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ サムネイル一番上に戻る</button>
  </div>

<script>
  const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const playlistId = "UUqRV_ZIQhVKfxG1_WkNiRbg";
  const historyKey = "frann_history";
  const laterKey = "frann_watch_later";

  const historySidebar = document.getElementById("historySidebar");
  const laterSidebar = document.getElementById("laterSidebar");
  const toggleHistoryBtn = document.getElementById("toggleHistoryBtn");
  const toggleLaterBtn = document.getElementById("toggleLaterBtn");
  const main = document.getElementById("main");

  const clearHistoryBtn = document.getElementById("clearHistoryBtn");
  const clearLaterBtn = document.getElementById("clearLaterBtn");
  const historyBox = document.getElementById("history");
  const laterBox = document.getElementById("watchLater");
  const player = document.getElementById("player");
  const videosContainer = document.getElementById("videos");
  const loadingEl = document.getElementById("loading");
  const searchInput = document.getElementById("searchInput");
  const jumpBtn = document.getElementById("jumpBtn");
  const topBtn = document.getElementById("topBtn");

  let currentActive = null;
  let currentVideoEl = null;

  function updateMainMargin() {
    let margin = 60;
    if (historySidebar.classList.contains("open")) margin += 375;
    if (laterSidebar.classList.contains("open")) margin += 375;
    main.style.marginLeft = margin + "px";
  }

  function loadList(key) { return JSON.parse(localStorage.getItem(key) || "[]"); }
  function saveList(key, list) { localStorage.setItem(key, JSON.stringify(list.slice(0, 30))); }

  function renderHistory() {
    const items = loadList(historyKey);
    historyBox.innerHTML = items.length === 0 ? '<p style="color:#888;text-align:center;padding:20px;">履歴はありません</p>' : "";
    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.textContent = item.title;
      div.onclick = () => document.querySelector(`[data-id="${item.id}"]`)?.scrollIntoView({behavior:"smooth", block:"center"});
      historyBox.appendChild(div);
    });
  }

  function renderWatchLater() {
    const items = loadList(laterKey);
    laterBox.innerHTML = items.length === 0 ? '<p style="color:#888;text-align:center;padding:20px;">後で見るリストは空です</p>' : "";
    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "later-item";
      div.textContent = item.title;
      div.onclick = () => document.querySelector(`[data-id="${item.id}"]`)?.scrollIntoView({behavior:"smooth", block:"center"});
      laterBox.appendChild(div);
    });
  }

  function addToWatchLater(videoId, title) {
    let list = loadList(laterKey);
    list = list.filter(item => item.id !== videoId);
    list.unshift({ id: videoId, title });
    saveList(laterKey, list);
    renderWatchLater();
  }

  function playVideo(videoId, title, videoItemElement) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    if (currentActive) currentActive.classList.remove("active");
    videoItemElement.classList.add("active");
    currentActive = videoItemElement;
    currentVideoEl = videoItemElement;

    let history = loadList(historyKey);
    history = history.filter(item => item.id !== videoId);
    history.unshift({ id: videoId, title });
    saveList(historyKey, history);
    renderHistory();
  }

  function copyLink(videoId) {
    const url = `https://www.youtube.com/watch?v=${videoId}`;
    navigator.clipboard.writeText(url).then(() => {
      const btn = event.currentTarget;
      const orig = btn.textContent;
      btn.textContent = "✓ コピー";
      btn.style.background = "#4caf50";
      setTimeout(() => { btn.textContent = orig; btn.style.background = "rgba(0,0,0,0.85)"; }, 1500);
    });
  }

  function filterVideos(keyword) {
    const lower = keyword.toLowerCase();
    document.querySelectorAll('.video-item').forEach(item => {
      const title = item.querySelector('.video-title').textContent.toLowerCase();
      item.style.display = title.includes(lower) ? '' : 'none';
    });
  }

  async function fetchAllVideos() { /* 前回と同じ */ 
    let items = [], pageToken = "", pageCount = 0;
    loadingEl.textContent = "動画を高速取得中...";
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`APIエラー: ${res.status}`);
      const data = await res.json();
      items = items.concat(data.items || []);
      pageToken = data.nextPageToken;
      pageCount++;
      loadingEl.textContent = `取得中... ${items.length}本`;
    } while (pageToken && pageCount < 20);
    return items;
  }

  function renderAllVideos(items) {
    videosContainer.innerHTML = "";
    const fragment = document.createDocumentFragment();
    items.forEach(item => {
      const title = item.snippet.title;
      const videoId = item.snippet.resourceId?.videoId;
      if (!videoId) return;
      const thumbnail = item.snippet.thumbnails?.medium?.url || "";
      const div = document.createElement("div");
      div.className = "video-item";
      div.dataset.id = videoId;
      div.innerHTML = `
        <div class="thumbnail">
          <img src="${thumbnail}" loading="lazy" alt="${title}">
          <div class="play-btn">▶</div>
        </div>
        <div class="video-title">
          ${title}
          <button class="copy-btn">🔗</button>
          <button class="later-btn">後で見る</button>
        </div>
      `;
      div.onclick = (e) => {
        if (!e.target.classList.contains('copy-btn') && !e.target.classList.contains('later-btn')) {
          playVideo(videoId, title, div);
        }
      };
      div.querySelector('.copy-btn').onclick = (e) => { e.stopPropagation(); copyLink(videoId); };
      div.querySelector('.later-btn').onclick = (e) => { e.stopPropagation(); addToWatchLater(videoId, title); };
      fragment.appendChild(div);
    });
    videosContainer.appendChild(fragment);
    loadingEl.style.display = "none";
  }

  // リサイズ機能（省略せず記載）
  let isResizingHorizontal = false, isResizingVertical = false;
  function initResize() {
    const resizeBar = document.getElementById("resize-bar");
    const playerHorizontalHandle = document.getElementById("player-horizontal-handle");
    const verticalResizeBar = document.getElementById("vertical-resize-bar");

    const startH = () => { isResizingHorizontal = true; resizeBar.classList.add("active"); document.body.style.cursor = "col-resize"; };
    const startV = () => { isResizingVertical = true; verticalResizeBar.classList.add("active"); document.body.style.cursor = "row-resize"; };

    resizeBar.addEventListener("mousedown", startH);
    playerHorizontalHandle.addEventListener("mousedown", startH);
    verticalResizeBar.addEventListener("mousedown", startV);

    document.addEventListener("mousemove", (e) => {
      if (isResizingHorizontal) {
        const mainRect = main.getBoundingClientRect();
        let w = ((e.clientX - mainRect.left) / mainRect.width) * 100;
        w = Math.max(25, Math.min(70, w));
        document.documentElement.style.setProperty("--player-width", w + "%");
      }
      if (isResizingVertical) {
        const rect = document.getElementById("player-area").getBoundingClientRect();
        let h = Math.max(280, Math.min(window.innerHeight * 0.95, e.clientY - rect.top));
        document.documentElement.style.setProperty("--player-height", (h / window.innerHeight * 100) + "vh");
      }
    });

    document.addEventListener("mouseup", () => {
      isResizingHorizontal = isResizingVertical = false;
      resizeBar.classList.remove("active");
      verticalResizeBar.classList.remove("active");
      document.body.style.cursor = "default";
    });
  }

  function toggleHistory() {
    historySidebar.classList.toggle("open");
    toggleHistoryBtn.textContent = historySidebar.classList.contains("open") ? "‹" : "›";
    updateMainMargin();
  }

  function toggleLater() {
    laterSidebar.classList.toggle("open");
    toggleLaterBtn.textContent = laterSidebar.classList.contains("open") ? "‹" : "›";
    updateMainMargin();
  }

  async function main() {
    try {
      const videos = await fetchAllVideos();
      renderAllVideos(videos);
      renderHistory();
      renderWatchLater();
      updateMainMargin();
    } catch (err) {
      console.error(err);
      videosContainer.innerHTML = `<p style="color:red;padding:20px;">読み込みエラー: ${err.message}</p>`;
      loadingEl.style.display = "none";
    }
  }

  // 初期化
  toggleHistoryBtn.addEventListener("click", toggleHistory);
  toggleLaterBtn.addEventListener("click", toggleLater);
  clearHistoryBtn.addEventListener("click", () => { if(confirm("再生履歴をすべて削除しますか？")) { localStorage.removeItem(historyKey); renderHistory(); }});
  clearLaterBtn.addEventListener("click", () => { if(confirm("後で見るリストをすべて削除しますか？")) { localStorage.removeItem(laterKey); renderWatchLater(); }});
  searchInput.addEventListener("input", (e) => filterVideos(e.target.value));

  initResize();
  main();
</script>
</body>
</html>
